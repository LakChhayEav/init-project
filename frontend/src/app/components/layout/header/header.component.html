<header class="h-16 flex items-center justify-between px-6 bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-20">
  <div class="flex items-center gap-4">
    <!-- Language Toggle -->
    <div class="bg-slate-100 p-1 rounded-xl flex items-center gap-1 border border-slate-200">
      <button (click)="langService.setLanguage('en')"
        class="px-3 py-1.5 rounded-lg text-xs font-black transition-all duration-300 uppercase "
        [class]="langService.currentLang() === 'en' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'">
        EN
      </button>
      <button (click)="langService.setLanguage('km')"
        class="px-3 py-1.5 rounded-lg text-xs font-black transition-all duration-300 uppercase  font-moul"
        [class]="langService.currentLang() === 'km' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'">
        KM
      </button>
    </div>
  </div>

  <div class="flex items-center gap-6">
    <!-- Search Trigger -->
    <button class="w-10 h-10 flex items-center justify-center rounded-full text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-all">
      <i class="bi bi-search text-lg"></i>
    </button>

    <!-- User Profile -->
    <div class="flex items-center gap-3 pl-6 border-l border-slate-200">
      <div class="text-right hidden sm:block">
        <div class="text-base font-black text-slate-900  leading-none mb-1 uppercase">{{ authService.username || 'User' }}</div>
        <div class="text-xs font-bold text-indigo-500 uppercase  leading-none">{{ authService.roles[0] || 'Member' }}</div>
      </div>
      <div class="relative group">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-indigo-600 to-indigo-400 flex items-center justify-center text-white shadow-lg shadow-indigo-100 ring-2 ring-white cursor-pointer group-hover:scale-105 transition-transform overflow-hidden">
          <i class="bi bi-person-fill text-xl"></i>
        </div>
        <!-- Online Status Dot -->
        <div class="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 bg-emerald-500 rounded-full border-2 border-white"></div>
      </div>
    </div>
  </div>
</header>

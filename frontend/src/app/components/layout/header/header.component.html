<header
  class="h-16 bg-white border-b border-slate-200 sticky top-0 z-20 flex items-center px-8 shadow-sm justify-between"
>
  <div class="flex items-center gap-4">
    <!-- Language Switcher -->
    <div class="flex bg-slate-100 rounded-lg p-1">
      <button
        type="button"
        class="px-3 py-1 rounded-md text-xs font-bold transition-all"
        [class]="
          langService.currentLang() === 'en'
            ? 'bg-white text-primary-600 shadow-sm'
            : 'text-slate-500 hover:text-slate-700'
        "
        (click)="changeLang('en')"
      >
        EN
      </button>
      <button
        type="button"
        class="px-3 py-1 rounded-md text-xs font-bold transition-all"
        [class]="
          langService.currentLang() === 'km'
            ? 'bg-white text-primary-600 shadow-sm'
            : 'text-slate-500 hover:text-slate-700'
        "
        (click)="changeLang('km')"
      >
        KM
      </button>
    </div>
  </div>

  <div class="flex items-center gap-3">
    <div
      class="flex items-center gap-2 px-3 py-1.5 bg-slate-50 rounded-full border border-slate-200"
    >
      <i class="bi bi-person-circle text-primary-600"></i>
      <span class="text-sm font-semibold text-slate-700">{{
        authService.usernameSignal() || 'User'
      }}</span>
    </div>
  </div>
</header>

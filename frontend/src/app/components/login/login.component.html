<div class="min-h-screen flex items-center justify-center bg-slate-50 p-6">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
    <div class="p-8">
      <div class="text-center mb-10">
        <div class="w-16 h-16 bg-gradient-to-tr from-primary-600 to-primary-400 text-white rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-primary-200">
          <i class="bi bi-shield-lock text-2xl"></i>
        </div>
        <h1 class="text-2xl font-black text-slate-900">{{ 'auth.signin' | translate }}</h1>
        <p class="text-slate-500 text-sm font-medium mt-1">Use your credentials to access the system</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="login()" class="space-y-5">
        <div class="space-y-1">
          <label for="username" class="label-pro text-slate-600">{{ 'user.username' | translate }}</label>
          <input id="username" formControlName="username" class="input-pro" [placeholder]="'user.username' | translate">
        </div>

        <div class="space-y-1">
          <div class="flex justify-between items-center">
            <label for="password" class="label-pro text-slate-600">{{ 'user.password' | translate }}</label>
            <a href="#" class="text-xs font-bold text-primary-600 hover:text-primary-700 transition-colors">Forgot?</a>
          </div>
          <input id="password" formControlName="password" type="password" class="input-pro" [placeholder]="'user.password' | translate">
        </div>

        <button type="submit" class="btn-primary-gdt w-full py-3 mt-4 text-base font-bold tracking-wide">
          {{ 'auth.signin' | translate }}
        </button>

        @if (error()) {
          <div class="p-3 bg-red-50 border border-red-100 text-red-600 rounded-xl text-xs font-bold flex items-center gap-2 animate-in fade-in">
            <i class="bi bi-exclamation-circle-fill"></i>
            {{ error() }}
          </div>
        }

        <div class="pt-6 border-t border-slate-100 text-center">
          <p class="text-xs font-medium text-slate-500">
            Don't have an account?
            <a routerLink="/signup" class="text-primary-600 hover:text-primary-700 font-bold ml-1 transition-colors underline-offset-4 hover:underline">Register now</a>
          </p>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="min-h-screen flex items-center justify-center bg-slate-50 p-6">
  <div
    class="w-full max-w-md bg-white rounded-2xl shadow-2xl shadow-slate-200/50 border border-slate-100 overflow-hidden"
  >
    <div class="p-8">
      <div class="text-center mb-10">
        <div
          class="w-16 h-16 bg-gradient-to-tr from-primary-600 to-primary-400 text-white rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-primary-200"
        >
          <i class="bi bi-person-plus text-2xl"></i>
        </div>
        <h1 class="text-2xl font-black text-slate-900">{{ 'auth.signup' | translate }}</h1>
        <p class="text-slate-500 text-sm font-medium mt-1">
          Create your account to join the platform
        </p>
      </div>

      <form [formGroup]="signupForm" (ngSubmit)="register()" class="space-y-5">
        <div class="space-y-1">
          <label for="signup-username" class="label-pro text-slate-600">{{
            'user.username' | translate
          }}</label>
          <input
            id="signup-username"
            formControlName="username"
            class="input-pro"
            [placeholder]="'user.username' | translate"
          />
        </div>

        <div class="space-y-1">
          <label for="signup-email" class="label-pro text-slate-600">Email Address</label>
          <input
            id="signup-email"
            formControlName="email"
            type="email"
            class="input-pro"
            placeholder="name@example.com"
          />
        </div>

        <div class="space-y-1">
          <label for="signup-password" class="label-pro text-slate-600">{{
            'user.password' | translate
          }}</label>
          <input
            id="signup-password"
            formControlName="password"
            type="password"
            class="input-pro"
            [placeholder]="'user.password' | translate"
          />
        </div>

        <button
          type="submit"
          class="btn-primary w-full py-3 mt-4 text-base font-bold tracking-wide"
        >
          Create Account
        </button>

        @if (error()) {
          <div
            class="p-3 bg-red-50 border border-red-100 text-red-600 rounded-xl text-xs font-bold flex items-center gap-2 animate-in fade-in"
          >
            <i class="bi bi-exclamation-circle-fill"></i>
            {{ error() }}
          </div>
        }

        @if (success()) {
          <div
            class="p-3 bg-green-50 border border-green-100 text-green-600 rounded-xl text-xs font-bold flex items-center gap-2 animate-in fade-in"
          >
            <i class="bi bi-check-circle-fill"></i>
            Account created! Redirecting...
          </div>
        }

        <div class="pt-6 border-t border-slate-100 text-center">
          <p class="text-xs font-medium text-slate-500">
            Already have an account?
            <a
              routerLink="/login"
              class="text-primary-600 hover:text-primary-700 font-bold ml-1 transition-colors underline-offset-4 hover:underline"
              >Sign in</a
            >
          </p>
        </div>
      </form>
    </div>
  </div>
</div>
